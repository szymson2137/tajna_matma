<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Matematyka</title>
    <link rel="icon" type="image/x-icon" href="szpont.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <table id="big">
        <tr>
            <td>
                <form class="date-form" onsubmit="applyDate(event)">
                    <input type="date" id="idata" name="idata" required>
                    <input id="submit" type="submit" value="dalej">
                    <br>
                    <button id="prev" type="button" onclick="jumpToPrevLesson()">Poprzednia lekcja</button>
                    <button id="next" type="button" onclick="jumpToNextLesson()">Następna lekcja</button>
                </form>
            </td>
        </tr>
        <tr>
            <td>
                <table border="1" id="small">
                    <thead>
                        <tr>
                            <th>Kolejność</th>
                            <th>Imię</th>
                            <th>Nr z dziennika</th>
                        </tr>
                    </thead>
                    <tbody id="tbody-rows">
                        
                    </tbody>
                </table>
            </td>
        </tr>
    </table>

    <script src="script.js"></script>
    <footer>
        Strona sama wybiera aktualny dzień lub dzień w którym jest najbliższa Matematyka. Jeżeli jest po godzinie 16:00 strona sama pokazuje najbliższy dzień w którym jest lekcja. <p>Stronę wykonał: <a href="https://github.com/szymson2137">szy_mson</a></p>
    </footer>
</body>
</html>
